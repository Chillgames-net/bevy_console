[package]
name = "bevy_chillgames_console"
version = "0.1.0"
edition = "2024"
description = "A configurable developer console plugin for Bevy games"
license = "MIT OR Apache-2.0"

[lib]
name = "bevy_chillgames_console"
path = "src/lib.rs"

[features]
# Embeds assets/UbuntuMono-R.ttf into the binary and uses it as the default font.
embedded-font = []

[dependencies]
bevy = { version = "0.18", default-features = false }
