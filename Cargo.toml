[package]
name = "chill_bevy_console"
version = "0.1.5"
edition = "2024"
description = "A configurable developer console plugin for Bevy games"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Chillgames-net/bevy_console"
homepage = "https://github.com/Chillgames-net/bevy_console"
documentation = "https://docs.rs/chill_bevy_console"
readme = "README.md"
keywords = ["bevy", "console", "gamedev", "plugin", "dev-tools"]
categories = ["game-development"]

[lib]
name = "chill_bevy_console"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true

[features]
# Embeds assets/UbuntuMono-R.ttf into the binary and uses it as the default font.
embedded-font = []
# Loads and saves the user's command history (Up/Down recall) to a plain-text
# file between runs, controlled by `ConsoleConfig::history_file`.
persistent-history = []

[dependencies]
bevy = "0.18"

[[example]]
name = "basic"
path = "examples/basic.rs"

[[example]]
name = "commands"
path = "examples/commands.rs"

[[example]]
name = "custom_config"
path = "examples/custom_config.rs"

[[example]]
name = "gameplay_blocking"
path = "examples/gameplay_blocking.rs"

[[example]]
name = "persistent_history"
path = "examples/persistent_history.rs"
required-features = ["persistent-history"]
